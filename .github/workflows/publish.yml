name: Publish

# Publishes to npm with provenance when a version tag (vX.Y.Z) is pushed.
# Requires the repository/org to have npm publishing configured (trusted publisher
# or NPM_TOKEN secret). Provenance needs `id-token: write`.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    name: build, verify, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Are the types wrong?
        run: npm run attw

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
